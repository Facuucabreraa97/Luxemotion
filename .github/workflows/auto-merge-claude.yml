name: Auto-merge Claude branches

# Se activa cuando Claude pushea a una rama que empieza con "claude/"
on:
  push:
    branches:
      - 'claude/**'

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      # 1. Descargar el codigo
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Crear un Pull Request automaticamente
      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ${{ github.ref_name }}
          base: main
          title: "Auto-merge: ${{ github.ref_name }}"
          body: |
            Cambios automaticos desde Claude Code.

            Este PR se va a mergear automaticamente.
            Vercel va a deployar los cambios una vez mergeado.
          delete-branch: true

      # 3. Mergear el PR automaticamente
      - name: Auto-merge PR
        if: steps.create-pr.outputs.pull-request-number
        run: gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} --squash --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
