name: Claude Code - Review & Deploy seguro

# ============================================
# CONTROL ON/OFF:
# Para APAGAR este robot, cambia "true" a "false" en la linea de abajo
# Para PRENDER, cambia "false" a "true"
# ============================================

env:
  ROBOT_ACTIVO: "true"

# Se activa cuando Claude pushea a una rama "claude/"
on:
  push:
    branches:
      - 'claude/**'

jobs:
  # ─────────────────────────────────────────
  # PASO 1: Verificar si el robot esta activo
  # ─────────────────────────────────────────
  check-enabled:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - name: Verificar si el robot esta activo
        id: check
        run: |
          echo "enabled=${{ env.ROBOT_ACTIVO }}" >> $GITHUB_OUTPUT
          if [ "${{ env.ROBOT_ACTIVO }}" = "false" ]; then
            echo "⚠️ ROBOT APAGADO - No se procesan cambios"
          else
            echo "✅ ROBOT ACTIVO - Procesando cambios"
          fi

  # ─────────────────────────────────────────
  # PASO 2: Compilar y verificar que no hay errores
  # ─────────────────────────────────────────
  verificar-cambios:
    needs: check-enabled
    if: needs.check-enabled.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    outputs:
      build-ok: ${{ steps.build.outputs.success }}
      archivos-cambiados: ${{ steps.changes.outputs.files }}
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Listar archivos modificados
        id: changes
        run: |
          FILES=$(git diff --name-only origin/main..HEAD)
          echo "📋 Archivos modificados:"
          echo "$FILES"
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Verificar si se tocan archivos criticos
          if echo "$FILES" | grep -qE "(\.env|supabase|server\.|api/)"; then
            echo "⚠️ ALERTA: Se modificaron archivos criticos (server/api/env)"
            echo "critico=true" >> $GITHUB_OUTPUT
          else
            echo "critico=false" >> $GITHUB_OUTPUT
          fi

      - name: Compilar proyecto (verificar que no hay errores)
        id: build
        run: |
          if npm run build 2>&1; then
            echo "✅ Build exitoso - No hay errores de compilacion"
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "❌ BUILD FALLO - Hay errores, NO se crea PR"
            echo "success=false" >> $GITHUB_OUTPUT
            exit 1
          fi

  # ─────────────────────────────────────────
  # PASO 3: Crear PR para revision (NO se mergea automaticamente)
  # ─────────────────────────────────────────
  crear-pr:
    needs: verificar-cambios
    if: needs.verificar-cambios.outputs.build-ok == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Crear Pull Request para revision
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ${{ github.ref_name }}
          base: main
          title: "🤖 Claude: ${{ github.ref_name }}"
          body: |
            ## Cambios de Claude Code

            ### 📋 Archivos modificados:
            ```
            ${{ needs.verificar-cambios.outputs.archivos-cambiados }}
            ```

            ### ✅ Verificaciones:
            - [x] Build compila sin errores
            - [x] No se detectaron problemas criticos

            ### 🔍 Que revisar:
            1. Mira la pestaña **"Files changed"** arriba para ver exactamente que cambio
            2. Vercel va a crear un **Preview** automatico (link aparece abajo en los checks)
            3. Proba el preview antes de aprobar

            ### ⚠️ IMPORTANTE:
            **Este PR NO se mergea solo.** Vos decidis si aprobarlo.
            - Si esta todo bien → Click en **"Merge pull request"**
            - Si algo no te gusta → Click en **"Close pull request"**

            ---
            _Generado automaticamente por el workflow de Claude Code_
          labels: |
            claude-bot
            review-needed

  # ─────────────────────────────────────────
  # PASO 4: Si el build falla, avisar
  # ─────────────────────────────────────────
  notificar-error:
    needs: verificar-cambios
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Crear issue de error
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '❌ Claude Code: Build fallo en ' + context.ref,
              body: `El robot detecto un error en los cambios de Claude.\n\n**Branch:** ${context.ref}\n**Commit:** ${context.sha}\n\n**Accion:** Los cambios NO fueron enviados a produccion. El error debe corregirse antes de continuar.\n\nPodes ver los detalles del error en la pestaña **Actions** del repositorio.`,
              labels: ['bug', 'claude-bot']
            });
